# Dynamic Regime Training Configuration
# Ospan et al. (2024), Table VI
# Achieves Δ_gap ≈ 0.06 vs 0.17 for static (Section IV-C)

model:
  base_model: "Qwen/Qwen2.5-3B-Instruct"
  regime: "dynamic"

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  num_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32
  learning_rate: 1.0e-4
  lr_min: 1.0e-6
  lr_scheduler: cosine
  warmup_steps: 200
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  bf16: true
  gradient_checkpointing: true
  early_stopping_patience: 2

data:
  train_path: "data/processed/dynamic_train.json"
  val_path: "data/processed/dynamic_val.json"
  max_context_length: 3000
  max_generation_length: 1500  # +300 budget for variable schema width

output:
  output_dir: "./checkpoints/dynamic"
  logging_steps: 50
  eval_steps: 500
  save_steps: 500

reproducibility:
  seed: 42
  deterministic: true
