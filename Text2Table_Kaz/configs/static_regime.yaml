# Static Regime Training Configuration
# Ospan et al. (2024), Table VI
# Seed: 42 (replication seeds: 123, 7)

model:
  base_model: "Qwen/Qwen2.5-3B-Instruct"
  regime: "static"

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  num_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32  # effective batch = 32
  learning_rate: 1.0e-4
  lr_min: 1.0e-6
  lr_scheduler: cosine
  warmup_steps: 200
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  bf16: true
  gradient_checkpointing: true
  early_stopping_patience: 2

data:
  train_path: "data/processed/static_train.json"
  val_path: "data/processed/static_val.json"
  max_context_length: 3000
  max_generation_length: 1500

output:
  output_dir: "./checkpoints/static"
  logging_steps: 50
  eval_steps: 500
  save_steps: 500

reproducibility:
  seed: 42
  deterministic: true
